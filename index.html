<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kahani TV</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-ima/1.11.0/videojs.ima.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #FFD700; --bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; user-select: none; }
        
        /* UI Components */
        .app-bar { height: 60px; border-bottom: 2px solid var(--primary); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; position: sticky; top: 0; background: #000; z-index: 100; }
        .app-title { color: var(--primary); font-size: 22px; font-weight: 900; }
        
        /* Lock Overlay */
        #lockOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .lock-card { border: 1px solid var(--primary); padding: 30px; border-radius: 15px; background: #111; }

        /* Grid */
        .cat-title { padding: 15px; color: var(--primary); font-weight: bold; }
        .poster-grid { display: flex; overflow-x: auto; gap: 10px; padding: 0 15px 20px; }
        .poster-card img { width: 120px; height: 170px; border-radius: 8px; object-fit: cover; border: 1px solid #333; }

        /* Player */
        #playerView { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; }
        .video-js { width: 100% !important; height: 100% !important; }
        
        .btn { padding: 12px 20px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; background: var(--primary); color: #000; width: 100%; }
    </style>
</head>
<body>

    <div id="lockOverlay">
        <div class="lock-card">
            <h2 style="color:var(--primary)">Access Locked!</h2>
            <p>24 ghante tak videos dekhne ke liye niche diye gaye button se ad dekhein.</p>
            <button class="btn" onclick="playRewardAd()">ADS DEKHEIN AUR UNLOCK KAREIN</button>
        </div>
    </div>

    <div id="homePage">
        <div class="app-bar">
            <div class="app-title" onclick="adminTrigger()">Kahani TV</div>
            <div id="timerDisplay" style="font-size: 10px; color: #fff;">Checking...</div>
        </div>
        <div id="contentArea"></div>
    </div>

    <div id="playerView">
        <video id="main_video" class="video-js vjs-default-skin" controls preload="auto" playsinline></video>
        <button style="position:absolute; top:15px; left:15px; z-index:10001; background:rgba(0,0,0,0.6); color:#fff; border:none; padding:8px 15px; border-radius:4px;" onclick="closePlayer()">BACK</button>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyCnCCWVcNhFBTCh7Tu9ctQ7QiGasUvgw4s", authDomain: "kuku-1cb36.firebaseapp.com", projectId: "kuku-1cb36", storageBucket: "kuku-1cb36.firebasestorage.app", messagingSenderId: "1089968385102", appId: "1:1089968385102:web:bf53c0b9b05c5659e3671f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // AdX VAST Tag
        const adTagUrl = "https://pubads.g.doubleclick.net/gampad/ads?sz=640x480&iu=/124319475/external/single_ad_samples&ciu_szs=300x250&impl=s&gdfp_req=1&env=vp&output=vast&unviewed_position_start=1&cust_params=deployment%3Ddevsite%26sample_ct%3Dlinear&correlator=";

        let player = null;
        let epCounter = 0;
        let midRollDone = false;

        window.onload = () => { checkAccess(); };

        // 1. 24-HOUR ACCESS LOGIC
        function checkAccess() {
            const expiry = localStorage.getItem('kahanitv_expiry');
            const now = Date.now();
            if (expiry && now < expiry) {
                document.getElementById('lockOverlay').style.display = 'none';
                loadContent();
            } else {
                document.getElementById('lockOverlay').style.display = 'flex';
            }
        }

        function playRewardAd() {
            alert("Ad loading... Please wait 5-10 seconds.");
            // Yahan aapka obfuscated script trigger hoga
            // Reward system simulation:
            setTimeout(() => {
                localStorage.setItem('kahanitv_expiry', Date.now() + (24 * 60 * 60 * 1000));
                checkAccess();
            }, 8000);
        }

        // 2. EVERY 3rd EPISODE LOGIC
        function handleNextEpisode() {
            epCounter++;
            if (epCounter >= 3) {
                epCounter = 0;
                triggerAdX(); // 3rd episode par ad
            } else {
                playNext();
            }
        }

        // 3. 10 MINUTE MID-ROLL LOGIC
        function setupMidRoll() {
            player.on('timeupdate', () => {
                let currentTime = player.currentTime();
                if (currentTime >= 600 && !midRollDone) { // 600 seconds = 10 mins
                    midRollDone = true;
                    triggerAdX();
                }
            });
        }

        function triggerAdX() {
            if (player) {
                player.ima.requestAds();
                player.play();
            }
        }

        // Content Loading & Player
        function loadContent() {
            db.collection("ott_content").orderBy("time", "desc").onSnapshot(snap => {
                const area = document.getElementById('contentArea');
                area.innerHTML = "";
                let data = []; snap.forEach(doc => data.push(doc.data()));
                
                let cats = {}; data.forEach(d => { if(!cats[d.category]) cats[d.category] = {}; if(!cats[d.category][d.name]) cats[d.category][d.name] = d.poster; });
                for(let cat in cats) {
                    area.innerHTML += `<div class="cat-title">${cat}</div><div class="poster-grid" id="${cat}"></div>`;
                    for(let story in cats[cat]) {
                        document.getElementById(cat).innerHTML += `
                        <div class="poster-card" onclick="openVideo('${story}')">
                            <img src="${cats[cat][story]}">
                            <p style="font-size:10px; text-align:center;">${story}</p>
                        </div>`;
                    }
                }
            });
        }

        async function openVideo(name) {
            const snap = await db.collection("ott_content").where("name", "==", name).get();
            let playlist = []; snap.forEach(doc => playlist.push(doc.data()));
            playlist.sort((a,b) => a.episode - b.episode);
            
            document.getElementById('playerView').style.display = 'block';
            if(!player) {
                player = videojs('main_video');
                player.ima({ id: 'main_video', adTagUrl: adTagUrl });
                setupMidRoll();
            }
            midRollDone = false; // Reset for new video
            player.src({ src: playlist[0].url, type: 'video/mp4' });
            player.play();
        }

        function closePlayer() {
            if(player) player.pause();
            document.getElementById('playerView').style.display = 'none';
        }

        function adminTrigger() { /* Deepak / Pawan login logic */ }
    </script>
</body>
</html>
