<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kahani TV - Premium</title>
    
    <script src="https://pl28852040.effectivegatecpm.com/a6/94/b3/a694b36c99794829f724531d3ae6e709.js"></script>

    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #FFD700; --bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; user-select: none; }
        .app-bar { height: 60px; border-bottom: 2px solid var(--primary); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; position: sticky; top: 0; background: #000; z-index: 100; }
        .app-title { color: var(--primary); font-size: 22px; font-weight: 900; cursor: pointer; }
        #addBtn { position: fixed; bottom: 30px; right: 30px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 35px; color: #000; z-index: 1000; cursor: pointer; box-shadow: 0 0 20px rgba(255,215,0,0.5); }
        #uploadBox, #adminBox, #lockOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 70000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .form-card { background: #111; border: 1px solid var(--primary); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; }
        .form-card input, .form-card select { width: 100%; padding: 12px; margin: 5px 0 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: var(--primary); color: #000; width: 100%; margin-top: 10px; }
        .cat-title { padding: 20px 15px 5px; color: var(--primary); font-weight: bold; }
        .poster-grid { display: flex; overflow-x: auto; gap: 12px; padding: 0 15px 20px; }
        .poster-card img { width: 130px; height: 185px; border-radius: 12px; object-fit: cover; }
        .source-tag { font-size: 9px; background: var(--primary); color: #000; padding: 2px 6px; border-radius: 3px; font-weight: 900; }
        #playerView { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; }
    </style>
</head>
<body>

    <div id="addBtn" onclick="document.getElementById('uploadBox').style.display='flex'">+</div>

    <div id="adminBox"><div class="form-card"><h3 style="color:var(--primary)">Deepak Bhai Login</h3><input type="text" id="admUser" placeholder="Username"><input type="password" id="admPass" placeholder="Password"><button class="btn" onclick="validateAdmin()">LOGIN</button></div></div>

    <div id="uploadBox"><div class="form-card"><h3 style="color:var(--primary)">ADD STORY</h3><input type="text" id="storyName" placeholder="Story Name"><input type="text" id="storyPoster" placeholder="Poster URL"><input type="text" id="storyUrl" placeholder="Video URL"><input type="text" id="storySource" placeholder="APK/Source Name"><input type="number" id="storyEp" value="1"><select id="storyCat"><option value="New Release">New Release</option><option value="Trending">Trending</option></select><button class="btn" onclick="saveStory()">PUBLISH</button><button class="btn" style="background:#444; color:white;" onclick="document.getElementById('uploadBox').style.display='none'">CLOSE</button></div></div>

    <div id="lockOverlay"><div class="form-card"><h2 style="color:var(--primary)">Access Locked!</h2><p>24 Ghante ke liye ads dekhein.</p><button class="btn" onclick="startUnlock()">UNLOCK NOW</button></div></div>

    <div id="homePage">
        <div class="app-bar"><div class="app-title" onclick="handleAdminTrigger()">Kahani TV</div></div>
        <div id="contentArea"></div>
    </div>

    <div id="playerView">
        <video id="main_video" class="video-js vjs-default-skin" controls preload="auto" playsinline style="width:100%; height:100%;"></video>
        <button style="position:absolute; top:20px; left:20px; z-index:10001; background:rgba(0,0,0,0.7); color:#fff; border:none; padding:10px 20px; border-radius:8px;" onclick="closePlayer()">BACK</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnCCWVcNhFBTCh7Tu9ctQ7QiGasUvgw4s", authDomain: "kuku-1cb36.firebaseapp.com", projectId: "kuku-1cb36", storageBucket: "kuku-1cb36.firebasestorage.app", messagingSenderId: "1089968385102", appId: "1:1089968385102:web:bf53c0b9b05c5659e3671f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let player = null, adminClicks = 0;

        window.onload = () => { checkAccess(); };

        function handleAdminTrigger() { adminClicks++; if(adminClicks >= 5) document.getElementById('adminBox').style.display = 'flex'; }
        
        function validateAdmin() {
            if(document.getElementById('admUser').value === "Deepak" && document.getElementById('admPass').value === "Pawan") {
                localStorage.setItem('kahanitv_boss', 'true');
                document.getElementById('addBtn').style.display = 'flex';
                document.getElementById('adminBox').style.display = 'none';
            } else alert("Galat!");
        }

        async function saveStory() {
            await db.collection("ott_content").add({
                name: document.getElementById('storyName').value,
                poster: document.getElementById('storyPoster').value,
                url: document.getElementById('storyUrl').value,
                source: document.getElementById('storySource').value,
                category: document.getElementById('storyCat').value,
                time: Date.now()
            });
            alert("Added!"); document.getElementById('uploadBox').style.display = 'none';
        }

        function checkAccess() {
            if(localStorage.getItem('kahanitv_boss') === 'true') document.getElementById('addBtn').style.display = 'flex';
            if (localStorage.getItem('kahanitv_expiry') > Date.now()) {
                document.getElementById('lockOverlay').style.display = 'none';
                loadContent();
            } else document.getElementById('lockOverlay').style.display = 'flex';
        }

        function startUnlock() {
            window.dispatchEvent(new Event('click')); // Adsterra Popunder trigger
            setTimeout(() => {
                localStorage.setItem('kahanitv_expiry', Date.now() + 86400000);
                checkAccess();
            }, 5000);
        }

        function loadContent() {
            db.collection("ott_content").orderBy("time", "desc").onSnapshot(snap => {
                const area = document.getElementById('contentArea'); area.innerHTML = "";
                let cats = {}; snap.forEach(doc => {
                    let d = doc.data();
                    if(!cats[d.category]) cats[d.category] = [];
                    cats[d.category].push(d);
                });
                for(let cat in cats) {
                    let html = `<div class="cat-title">${cat}</div><div class="poster-grid">`;
                    cats[cat].forEach(s => html += `<div class="poster-card" onclick="openVideo('${s.url}')"><span class="source-tag">${s.source}</span><img src="${s.poster}"></div>`);
                    area.innerHTML += html + `</div>`;
                }
            });
        }

        function openVideo(url) {
            document.getElementById('playerView').style.display = 'block';
            if(!player) player = videojs('main_video');
            player.src({ src: url, type: 'video/mp4' });
            player.play();
            // 10 Min Mid-roll trigger
            player.on('timeupdate', () => { if(player.currentTime() >= 600) window.dispatchEvent(new Event('click')); });
        }
        function closePlayer() { if(player) player.pause(); document.getElementById('playerView').style.display = 'none'; }
    </script>
</body>
</html>
